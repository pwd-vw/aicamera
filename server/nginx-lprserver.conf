# Nginx config ตัวอย่างสำหรับ LPR Server (lprserver)
# ใช้ path: /home/devuser/aicamera/server/
# ติดตั้ง: sudo cp nginx-lprserver.conf /etc/nginx/sites-available/lprserver
#         sudo ln -sf /etc/nginx/sites-available/lprserver /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # ราก (/) = Landing page จาก server/landing/index.html
    # location = / (exact) ใช้เฉพาะ URI "/" ; location / (prefix) ใช้กับ path อื่นที่ยังไม่ match location เฉพาะ เช่น /server/ หรือ /ws/
    location = / {
        root /home/devuser/aicamera/server/landing;
        index index.html;
        try_files /index.html =404;
    }
    location / {
        root /home/devuser/aicamera/server/landing;
        index index.html;
        try_files $uri $uri/ /index.html =404;
    }

    # Frontend Vue app (แบบ A: static จาก dist)
    # alias โฟลเดอร์ dist: request /server/ → dist/index.html, /server/js/xxx → dist/js/xxx
    location /server/ {
        alias /home/devuser/aicamera/server/frontend-app/dist/;
        index index.html;
        try_files $uri $uri/ /server/index.html =404;
    }

    # Backend API proxy (ส่ง path เต็ม /server/api/ ไป backend เพื่อให้ Nest global prefix ตรง)
    location /server/api/ {
        proxy_pass http://127.0.0.1:3000/server/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO) proxy
    location /ws/ {
        proxy_pass http://127.0.0.1:3001/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect ไม่มี slash ไปมี slash
    location = /server {
        return 301 /server/;
    }
    location = /ws {
        return 301 /ws/;
    }
}
