[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not hardware"
markers =
    hardware: marks tests as requiring hardware (deselect with '-m "not hardware"')
    camera: marks tests as requiring camera hardware
    libcamera: marks tests as requiring libcamera
