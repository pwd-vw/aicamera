# AI Camera Kiosk Browser Configuration
# ไฟล์การตั้งค่าสำหรับ kiosk browser handler

[General]
# Web URL ที่จะเปิดใน browser
web_url = http://localhost/

# Path ของ browser executable
browser_path = /usr/lib/chromium/chromium

# Directory สำหรับเก็บ user data
user_data_dir = /tmp/chromium-ai-camera

# Port สำหรับ remote debugging (headless mode)
remote_debug_port = 9222

# Timeout สำหรับรอ services (วินาที)
wait_timeout = 120

# ช่วงเวลาตรวจสอบสุขภาพ browser (วินาที)
check_interval = 30

# จำนวนครั้งที่พยายาม restart
max_retries = 3

# ใช้ headless mode เป็น fallback หรือไม่
headless_fallback = true

[Environment_Detection]
# ตรวจสอบ DISPLAY environment
check_display = true

# ตรวจสอบ X server
check_x_server = true

# ตรวจสอบ screen resolution
check_screen_resolution = true

# ตรวจสอบ embedded system
check_embedded_system = true

# ตรวจสอบ memory usage
check_memory_usage = true

[Browser_Arguments]
# Base arguments สำหรับทุก mode
base_args = --no-sandbox, --disable-dev-shm-usage, --disable-web-security

# Headless mode arguments
headless_args = --headless, --disable-gpu, --disable-extensions, --disable-plugins

# Kiosk mode arguments
kiosk_args = --kiosk, --disable-gpu, --disable-extensions, --disable-plugins

[Service_Dependencies]
# Services ที่ต้องรอให้พร้อมก่อนเริ่ม browser
required_services = nginx, aicamera_lpr

# Timeout สำหรับแต่ละ service (วินาที)
nginx_timeout = 30
aicamera_lpr_timeout = 60

[Health_Check]
# ตรวจสอบ memory usage threshold (MB)
memory_threshold = 1000

# ตรวจสอบ CPU usage threshold (%)
cpu_threshold = 80

# ตรวจสอบ process status
check_process_status = true

[Logging]
# Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level = INFO

# Log file path
log_file = /tmp/kiosk_browser.log

# Log format
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

[Fallback_Behavior]
# เมื่อ kiosk mode ล้มเหลว ให้ใช้ headless mode หรือไม่
fallback_to_headless = true

# เมื่อ headless mode ล้มเหลว ให้ retry หรือไม่
retry_on_headless_failure = true

# จำนวนครั้งที่ retry ก่อนหยุด
max_fallback_retries = 3
