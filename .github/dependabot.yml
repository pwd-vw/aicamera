version: 2
updates:
  # Node.js dependencies for server
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "server"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "socket.io"
        update-types: ["version-update:semver-major"]

  # Python dependencies for edge
  - package-ecosystem: "pip"
    directory: "/edge"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "edge"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "flask"
        update-types: ["version-update:semver-major"]
      - dependency-name: "opencv-python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "picamera2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "degirum"
        update-types: ["version-update:semver-major"]
      # Ignore commented-out packages that are not available for ARM64
      - dependency-name: "hailo-platform"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "hailo-model-zoo"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
