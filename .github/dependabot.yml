version: 2
updates:
  # Node.js dependencies for server (NestJS)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    # reviewers:
    #   - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "server"
      - "nodejs"
    ignore:
      # Ignore major version updates for critical packages to prevent breaking changes
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "socket.io"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      # Ignore packages that might cause conflicts
      - dependency-name: "passport"
        update-types: ["version-update:semver-major"]
      - dependency-name: "passport-jwt"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bcryptjs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jsonwebtoken"
        update-types: ["version-update:semver-major"]

  # Node.js dependencies for frontend (Vue.js)
  - package-ecosystem: "npm"
    directory: "/server/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 3
    # reviewers:
    #   - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
      - "vue"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pinia"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Python dependencies for edge (Flask + AI)
  - package-ecosystem: "pip"
    directory: "/edge"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
    open-pull-requests-limit: 5
    # reviewers:
    #   - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "edge"
      - "python"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "flask"
        update-types: ["version-update:semver-major"]
      - dependency-name: "flask-socketio"
        update-types: ["version-update:semver-major"]
      - dependency-name: "opencv-python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "picamera2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "degirum"
        update-types: ["version-update:semver-major"]
      - dependency-name: "degirum-tools"
        update-types: ["version-update:semver-major"]
      - dependency-name: "degirum-cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "easyocr"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sqlalchemy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "alembic"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pillow"
        update-types: ["version-update:semver-major"]
      - dependency-name: "werkzeug"
        update-types: ["version-update:semver-major"]
      # Ignore packages that might cause system conflicts
      - dependency-name: "setuptools"
        update-types: ["version-update:semver-major"]
      - dependency-name: "wheel"
        update-types: ["version-update:semver-major"]
      # Ignore commented-out packages
      - dependency-name: "hailo-platform"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "hailo-model-zoo"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
    open-pull-requests-limit: 3
    # reviewers:
    #   - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    ignore:
      # Ignore major version updates for critical actions
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]

  # Docker dependencies (if using Docker)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "13:00"
    open-pull-requests-limit: 2
    # reviewers:
    #   - "popwandee"
    assignees:
      - "popwandee"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Ignore major version updates for base images
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "postgres"
        update-types: ["version-update:semver-major"]
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]
