name: Tailscale Network Health Monitoring

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      check_all_devices:
        description: 'Check all devices in Tailscale network'
        required: false
        default: true
        type: boolean
      target_device:
        description: 'Check specific device only'
        required: false
        default: ''
        type: string

env:
  TAILSCALE_DOMAIN: tail605477.ts.net
  LPR_SERVER: lprserver.tail605477.ts.net
  EDGE_DEVICES: aicamera1.tail605477.ts.net,aicamera2.tail605477.ts.net,aicamera3.tail605477.ts.net,aicamera4.tail605477.ts.net,aicamera5.tail605477.ts.net

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check LPR Server Health
        run: |
          echo "🔍 Checking LPR Server Health (via nginx proxy)..."
          if curl -s -f --connect-timeout 10 http://${{ env.LPR_SERVER }}/health >/dev/null 2>&1; then
            echo "✅ LPR Server is healthy"
            echo "LPR_SERVER_HEALTH=success" >> $GITHUB_ENV
          else
            echo "❌ LPR Server health check failed"
            echo "LPR_SERVER_HEALTH=failed" >> $GITHUB_ENV
          fi

      - name: Check Edge Devices Health
        run: |
          echo "🔍 Checking Edge Devices Health..."
          
          # Convert comma-separated list to array
          IFS=',' read -ra DEVICES <<< "${{ env.EDGE_DEVICES }}"
          
          HEALTH_STATUS=""
          FAILED_DEVICES=""
          
          for device in "${DEVICES[@]}"; do
            echo "   Checking $device..."
            if curl -s -f --connect-timeout 10 http://$device/health >/dev/null 2>&1; then
              echo "   ✅ $device is healthy"
              HEALTH_STATUS="${HEALTH_STATUS}✅ $device\n"
            else
              echo "   ❌ $device health check failed"
              HEALTH_STATUS="${HEALTH_STATUS}❌ $device\n"
              FAILED_DEVICES="${FAILED_DEVICES}$device "
            fi
          done
          
          echo "EDGE_DEVICES_HEALTH_STATUS<<EOF" >> $GITHUB_ENV
          echo -e "$HEALTH_STATUS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          if [ -n "$FAILED_DEVICES" ]; then
            echo "EDGE_DEVICES_FAILED=$FAILED_DEVICES" >> $GITHUB_ENV
            echo "OVERALL_STATUS=failed" >> $GITHUB_ENV
          else
            echo "OVERALL_STATUS=success" >> $GITHUB_ENV
          fi

      - name: Check Tailscale Connectivity
        run: |
          echo "🔍 Checking Tailscale Network Connectivity..."
          
          # Check if we can reach the Tailscale domain
          if nslookup ${{ env.TAILSCALE_DOMAIN }} >/dev/null 2>&1; then
            echo "✅ Tailscale DNS resolution working"
            echo "TAILSCALE_DNS=success" >> $GITHUB_ENV
          else
            echo "❌ Tailscale DNS resolution failed"
            echo "TAILSCALE_DNS=failed" >> $GITHUB_ENV
          fi
          
          # Check basic connectivity to LPR server
          if ping -c 1 ${{ env.LPR_SERVER }} >/dev/null 2>&1; then
            echo "✅ Basic connectivity to LPR server working"
            echo "LPR_CONNECTIVITY=success" >> $GITHUB_ENV
          else
            echo "❌ Basic connectivity to LPR server failed"
            echo "LPR_CONNECTIVITY=failed" >> $GITHUB_ENV
          fi

      - name: Generate Health Report
        run: |
          echo "📊 Tailscale Network Health Report"
          echo "=================================="
          echo "Timestamp: $(date)"
          echo "Network Domain: ${{ env.TAILSCALE_DOMAIN }}"
          echo ""
          
          echo "🌐 Network Connectivity:"
          echo "   DNS Resolution: ${{ env.TAILSCALE_DNS }}"
          echo "   LPR Connectivity: ${{ env.LPR_CONNECTIVITY }}"
          echo ""
          
          echo "🖥️  LPR Server:"
          echo "   Status: ${{ env.LPR_SERVER_HEALTH }}"
          echo "   URL: http://${{ env.LPR_SERVER }}/health (via nginx proxy)"
          echo ""
          
          echo "📱 Edge Devices:"
          echo -e "${{ env.EDGE_DEVICES_HEALTH_STATUS }}"
          
          if [ "${{ env.OVERALL_STATUS }}" = "failed" ]; then
            echo "⚠️  Failed Devices: ${{ env.EDGE_DEVICES_FAILED }}"
            echo "❌ Overall Status: FAILED"
            exit 1
          else
            echo "✅ Overall Status: HEALTHY"
          fi

      - name: Create Issue for Failed Devices
        if: env.OVERALL_STATUS == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const failedDevices = process.env.EDGE_DEVICES_FAILED || '';
            const lprHealth = process.env.LPR_SERVER_HEALTH || '';
            
            let title = '🚨 Tailscale Network Health Alert';
            let body = `## Network Health Check Failed
            
            **Timestamp:** ${new Date().toISOString()}
            **Network Domain:** ${process.env.TAILSCALE_DOMAIN}
            
            ### Failed Components:
            `;
            
            if (lprHealth === 'failed') {
              body += `- ❌ LPR Server: http://${process.env.LPR_SERVER}/health\n`;
            }
            
            if (failedDevices) {
              body += `- ❌ Edge Devices: ${failedDevices}\n`;
            }
            
            body += `
            ### Action Required:
            1. Check device connectivity
            2. Verify Tailscale network status
            3. Check service logs on failed devices
            4. Restart services if necessary
            
            ### Troubleshooting Commands:
            \`\`\`bash
            # Check Tailscale status
            tailscale status
            
            # Check service status
            sudo systemctl status aicamera_lpr.service
            
            # Check nginx status
            sudo systemctl status nginx
            
            # Check logs
            sudo journalctl -u aicamera_lpr.service -f
            \`\`\`
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['tailscale', 'health-check', 'alert']
            });

      - name: Update Health Status
        run: |
          # Create or update health status file
          cat > .github/tailscale-health-status.json << EOF
          {
            "last_check": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "overall_status": "${{ env.OVERALL_STATUS }}",
            "lpr_server": {
              "hostname": "${{ env.LPR_SERVER }}",
              "health": "${{ env.LPR_SERVER_HEALTH }}",
              "connectivity": "${{ env.LPR_CONNECTIVITY }}"
            },
            "edge_devices": {
              "failed": "${{ env.EDGE_DEVICES_FAILED }}",
              "total": 5,
              "healthy": $((5 - $(echo "${{ env.EDGE_DEVICES_FAILED }}" | wc -w)))
            },
            "network": {
              "domain": "${{ env.TAILSCALE_DOMAIN }}",
              "dns": "${{ env.TAILSCALE_DNS }}"
            }
          }
          EOF
          
          echo "✅ Health status updated"

  notify-health-status:
    runs-on: ubuntu-latest
    needs: health-check
    if: always()
    
    steps:
      - name: Notify Health Status
        run: |
          if [ "${{ needs.health-check.result }}" = "success" ]; then
            echo "✅ Tailscale Network Health Check: PASSED"
            echo "📊 All devices are healthy and operational"
          else
            echo "❌ Tailscale Network Health Check: FAILED"
            echo "📋 Check the logs above for details"
            echo "📋 An issue has been created for failed devices"
          fi
 